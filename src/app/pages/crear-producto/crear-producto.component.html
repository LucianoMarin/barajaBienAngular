<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h2 class="mb-0">Crear Producto</h2>
        </div>
        
        <div class="card-body">
          <div *ngIf="mensaje()" class="mb-3">
            <div class="alert" 
                 [class.alert-success]="mensajeTipo() === 'success'" 
                 [class.alert-danger]="mensajeTipo() === 'error'"
                 role="alert">
              {{ mensaje() }}
            </div>
          </div>
          
          <form #productoForm="ngForm" (ngSubmit)="crearProducto()">
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="nombre" class="form-label fw-bold">Nombre</label>
                  <input type="text" 
                         id="nombre" 
                         class="form-control" 
                         placeholder="Ingresa el nombre del producto"
                         [(ngModel)]="nombre" 
                         name="nombre" 
                         required>
                </div>
                
                <div class="mb-3">
                  <label for="categoria" class="form-label fw-bold">Categoría</label>
                  <select id="categoria" 
                          class="form-control" 
                          [(ngModel)]="categoria" 
                          name="categoria" 
                          required>
                    <option value="">Selecciona una categoría</option>
                    <option value="MYL">MYL</option>
                    <option value="Pokemon">Pokemon</option>
                    <option value="Magic">Magic</option>
                    <option value="Yugioh">Yugioh</option>
                  </select>
                </div>
                
                <div class="mb-3">
                  <label for="precio" class="form-label fw-bold">Precio</label>
                  <input type="number" 
                         id="precio" 
                         class="form-control" 
                         placeholder="Ingresa el precio"
                         [(ngModel)]="precio" 
                         name="precio" 
                         required>
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="imagen" class="form-label fw-bold">URL de la Imagen</label>
                  <input type="text" 
                         id="imagen" 
                         class="form-control" 
                         placeholder="assets/images/productos/prod1.webp"
                         [(ngModel)]="imagen" 
                         name="imagen" 
                         required>
                </div>
                
                <div class="mb-3">
                  <label for="descripcion" class="form-label fw-bold">Descripción</label>
                  <textarea id="descripcion" 
                            class="form-control" 
                            rows="4" 
                            placeholder="Descripción del producto"
                            [(ngModel)]="descripcion" 
                            name="descripcion" 
                            required></textarea>
                </div>
              </div>
            </div>

            <div class="row mt-3">
              <div class="col-12">
                <div class="d-flex gap-2 justify-content-center">
                  <button type="submit" 
                          class="btn btn-success px-5 py-2" 
                          [disabled]="!productoForm.valid">
                    Crear Producto
                  </button>
                  <button type="button" 
                          class="btn btn-secondary px-5 py-2" 
                          (click)="limpiarFormulario()">
                    Limpiar
                  </button>
                  <button type="button" 
                          class="btn btn-primary px-5 py-2" 
                          routerLink="/perfil">
                    Volver al Perfil
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
